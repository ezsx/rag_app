# compose.dev.yml — Локальная разработка.
#
# Порядок запуска (обязательно ПЕРЕД compose up):
#   1. Windows Host:  llama-server.exe (V100, :8080)
#   2. Ubuntu WSL2:   gpu_server.py — embedding + reranker (:8082)
#   3. docker compose -f deploy/compose/compose.dev.yml up
#
# Ingest (отдельно):
#   docker compose -f deploy/compose/compose.dev.yml run --rm ingest \
#     --channel @channel_name --since 2024-01-01 --until 2024-07-01
#
# GPU в Docker недоступен (DEC-0024: V100 TCC блокирует NVML).

name: rag-dev

services:

  # ─── Infrastructure ────────────────────────────────────────

  qdrant:
    extends:
      file: services.yml
      service: qdrant
    ports:
      - "16333:6333"
      - "16334:6334"

  # ─── API ───────────────────────────────────────────────────

  api:
    extends:
      file: services.yml
      service: api
    env_file:
      - ../../.env
    volumes:
      - ../../src:/app
      - ../../scripts:/app/scripts
      - ../../sessions:/app/sessions
      - ../../datasets:/app/datasets
    ports:
      - "8001:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - TG_SESSION=/app/sessions/telegram.session
      # LLM — llama-server на Windows Host (V100 TCC)
      - LLM_BASE_URL=http://host.docker.internal:8080
      - LLM_MODEL_NAME=qwen3-30b-a3b
      - LLM_REQUEST_TIMEOUT=120
      # Embedding TEI — WSL2 native, RTX 5060 Ti
      - EMBEDDING_TEI_URL=http://host.docker.internal:8082
      # Reranker — gpu_server.py на том же порту что embedding (WSL2 native, RTX 5060 Ti)
      - RERANKER_TEI_URL=http://host.docker.internal:8082
      # Qdrant — Docker CPU
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=news
      # PCA whitening: отключён (recall 0.56 < baseline 0.70)
      # news_whitened коллекция сохранена для экспериментов
      # - QDRANT_COLLECTION=news_whitened
      # - WHITENING_PARAMS_PATH=datasets/whitening_params.npz
      # - COVERAGE_THRESHOLD=0.35
      # Coverage (DEC-0019)
      - COVERAGE_THRESHOLD=0.65
      - MAX_REFINEMENTS=2
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --loop uvloop --reload

  # ─── Ingest (on-demand) ───────────────────────────────────

  ingest:
    extends:
      file: services.yml
      service: ingest
    env_file:
      - ../../.env
    profiles: ["ingest"]
    volumes:
      - ../../scripts:/app/scripts
      - ../../src:/app/src
      - ../../sessions:/app/sessions
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app/src
      - TG_SESSION=/app/sessions/telegram.session
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=news
      - EMBEDDING_TEI_URL=http://host.docker.internal:8082

volumes:
  qdrant_data:

networks:
  default:
    name: rag-net
